<div class="flex h-screen overflow-hidden bg-[#0f172a] font-sans text-slate-100 selection:bg-indigo-500/30">
  <app-toast></app-toast>

  <!-- Persistent Left Sidebar -->
  <aside class="w-80 flex-shrink-0 z-30 h-full border-r border-slate-800 bg-[#1e293b] shadow-2xl relative">
    <app-training-sidebar></app-training-sidebar>
  </aside>

  <!-- Main Content Area -->
  <main class="flex-1 relative overflow-hidden flex flex-col bg-[#0f172a]">
    <div class="flex-1 relative overflow-auto scroll-smooth custom-scrollbar">
      <router-outlet></router-outlet>
    </div>

    <!-- Global Console Interface -->
    <div class="bg-[#020617] border-t border-slate-800 relative z-20 transition-all duration-300"
      [style.height]="isConsoleVisible ? '300px' : '40px'">

      <!-- Console Header / Toggle Bar -->
      <div
        class="flex items-center justify-between px-6 h-10 border-b border-slate-800/50 cursor-pointer hover:bg-slate-900/40"
        (click)="toggleConsole()">
        <div class="flex items-center gap-3">
          <span class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em]">System Terminal</span>
          <span *ngIf="!isConsoleVisible"
            class="text-[10px] text-emerald-500 font-bold animate-pulse uppercase tracking-widest">● Monitoring
            active</span>
        </div>
        <button class="text-slate-500 hover:text-white transition-colors">
          <svg class="w-4 h-4 transition-transform duration-300" [class.rotate-180]="!isConsoleVisible" fill="none"
            stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
          </svg>
        </button>
      </div>

      <!-- Log Panel Content (Only visible if isConsoleVisible) -->
      <div *ngIf="isConsoleVisible" class="h-[260px]">
        <app-log-panel></app-log-panel>
      </div>
    </div>
  </main>
</div>
